<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background: #f4f7fc;
            height: 100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:400px;
            border:none;
            border-radius:20px;
            overflow:hidden;
        }

        .login-header{
            background:#0d6efd;
            color:white;
            padding:30px;
            text-align:center;
        }

        .login-body{
            padding:30px;
            background:white;
        }

    </style>

</head>

<body>

<div class="card shadow login-card">

    <!-- HEADER -->
    <div class="login-header">

        <h2>
            Login
        </h2>

        <p class="mb-0">
            Doctor Management System
        </p>

    </div>

    <!-- BODY -->
    <div class="login-body">

        <!-- ERROR -->
        <div th:if="${error}"
             class="alert alert-danger">

            <span th:text="${error}"></span>

        </div>

        <!-- FORM -->
        <form action="/login"
              method="post">

            <!-- USERNAME -->
            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <!-- PASSWORD -->
            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <!-- BUTTON -->
            <button type="submit"
                    class="btn btn-primary w-100">

                Login

            </button>

        </form>

    </div>

</div>

</body>

</html>
