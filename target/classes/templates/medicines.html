<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Medicine Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container-fluid">

        <a class="navbar-brand fw-bold"
           href="/">

            DOCTOR ADMIN

        </a>

        <div class="navbar-nav">

            <a class="nav-link"
               href="/">

                Dashboard

            </a>

            <a class="nav-link"
               href="/users">

                Users

            </a>

            <a class="nav-link"
               href="/appointments">

                Appointments

            </a>
<a href="/packages">Packages</a>
            <a class="nav-link active"
               href="/medicines">

                Medicines

            </a>

        </div>

    </div>

</nav>

<!-- CONTENT -->
<div class="container mt-4">

    <h2 class="mb-4">
        Medicine Management
    </h2>

    <!-- FORM -->
    <div class="card shadow-sm p-4 mb-4">

        <form action="/medicines/save"
              method="post"
              class="row g-3">

            <div class="col-md-3">

                <input type="text"
                       name="name"
                       class="form-control"
                       placeholder="Medicine Name"
                       required>

            </div>

            <div class="col-md-2">

                <input type="text"
                       name="category"
                       class="form-control"
                       placeholder="Category"
                       required>

            </div>

            <div class="col-md-2">

                <input type="number"
                       name="price"
                       class="form-control"
                       placeholder="Price"
                       required>

            </div>

            <div class="col-md-2">

                <input type="number"
                       name="stock"
                       class="form-control"
                       placeholder="Stock"
                       required>

            </div>

            <div class="col-md-3">

                <input type="text"
                       name="image"
                       class="form-control"
                       placeholder="Image URL">

            </div>

            <div class="col-md-12">

                <button class="btn btn-primary">
                    Add Medicine
                </button>

            </div>

        </form>

    </div>

    <!-- TABLE -->
    <div class="card shadow-sm p-3">

        <table class="table table-bordered table-hover align-middle">

            <thead class="table-dark">

            <tr>

                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Action</th>

            </tr>

            </thead>

            <tbody>

            <tr th:each="m : ${medicines}">

                <td th:text="${m.id}"></td>

                <td>

                 <img th:src="${m.imageUrl != null && !m.imageUrl.isEmpty() 
              ? m.imageUrl 
              : 'https://via.placeholder.com/70'}"
     width="70"
     height="70"
     style="object-fit:cover;">
                </td>

                <td th:text="${m.name}"></td>

                <td th:text="${m.category}"></td>

                <td th:text="${m.price}"></td>

                <td th:text="${m.stock}"></td>

                <td>

                    <a th:href="@{/medicines/delete/{id}(id=${m.id})}"
                       class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
