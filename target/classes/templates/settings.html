<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>System Settings</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo-title">
            RETINA AI<br>ADMIN
        </div>

        <a href="/" class="nav-link">
            Dashboard
        </a>

        <a href="/users" class="nav-link">
            Patients
        </a>

        <a href="/analysis" class="nav-link">
            AI Analysis
        </a>

        <a href="/settings" class="nav-link active">
            Settings
        </a>

    </div>

    <!-- MAIN -->
    <div class="main-content">

        <div class="topbar">

            <h3>
                System Settings
            </h3>

        </div>

        <!-- FORM -->
        <div class="card-box mb-4">

            <h4 class="mb-4">
                AI Configuration
            </h4>

            <form action="/settings/save"
                  method="post"
                  class="row g-3">

                <div class="col-md-4">

                    <label class="form-label">
                        AI Engine Status
                    </label>

                    <select name="aiStatus"
                            class="form-select">

                        <option>ONLINE</option>
                        <option>OFFLINE</option>

                    </select>

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Risk Threshold
                    </label>

                    <input type="number"
                           step="0.1"
                           name="riskThreshold"
                           class="form-control"
                           placeholder="0.8">

                </div>

                <div class="col-md-4">

                    <label class="form-label">
                        Max Upload Images
                    </label>

                    <input type="number"
                           name="maxUploadImages"
                           class="form-control"
                           placeholder="100">

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Email Notification
                    </label>

                    <select name="emailNotification"
                            class="form-select">

                        <option>Enabled</option>
                        <option>Disabled</option>

                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">
                        Privacy Mode
                    </label>

                    <select name="privacyMode"
                            class="form-select">

                        <option>Enabled</option>
                        <option>Disabled</option>

                    </select>

                </div>

                <div class="col-md-12">

                    <button class="btn btn-primary">
                        Save Settings
                    </button>

                </div>

            </form>

        </div>

        <!-- TABLE -->
        <div class="card-box">

            <h4 class="mb-4">
                Saved Configurations
            </h4>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>AI Status</th>
                    <th>Threshold</th>
                    <th>Notification</th>
                    <th>Privacy</th>
                    <th>Max Upload</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="s : ${settings}">

                    <td th:text="${s.id}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:if="${s.aiStatus == 'ONLINE'}">

                            ONLINE

                        </span>

                        <span class="badge bg-danger"
                              th:if="${s.aiStatus == 'OFFLINE'}">

                            OFFLINE

                        </span>

                    </td>

                    <td th:text="${s.riskThreshold}"></td>

                    <td th:text="${s.emailNotification}"></td>

                    <td th:text="${s.privacyMode}"></td>

                    <td th:text="${s.maxUploadImages}"></td>

                    <td>

                        <a th:href="@{/settings/delete/{id}(id=${s.id})}"
                           class="btn btn-danger btn-sm">

                            Delete

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
