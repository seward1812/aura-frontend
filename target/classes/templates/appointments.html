<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Appointments</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR: BUG FIX - Chuẩn hóa sidebar đầy đủ link, đổi tên logo thống nhất "RETINA AI ADMIN" -->
    <div class="sidebar">

        <div class="logo-title">
            RETINA AI<br>ADMIN
        </div>

        <a href="/" class="nav-link">Dashboard</a>
        <a href="/users" class="nav-link">AccountS</a>
        <a href="/doctors" class="nav-link">Doctors</a>
        <a href="/clinics" class="nav-link">Clinics</a>
        <a href="/appointments" class="nav-link active">Appointments</a>
        <a href="/medicines" class="nav-link">Medicines</a>
        <a href="/packages" class="nav-link">Packages</a>
        <a href="/analysis" class="nav-link">AI Analysis</a>
        <a href="/reports" class="nav-link">AI Reports</a>
        <a href="/settings" class="nav-link">Settings</a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOPBAR -->
        <div class="topbar">

            <h3>
                Appointment Management
            </h3>

            <span th:text="${session.admin}">Admin</span>

        </div>

        <!-- CARD -->
        <div class="card-box">

            <!-- FORM -->
            <h5 class="mb-3 fw-bold">Book Appointment</h5>

            <form action="/appointments/save"
                  method="post"
                  class="row g-3 mb-5">

                <div class="col-md-4">

                    <input type="text"
                           name="patientName"
                           class="form-control"
                           placeholder="Patient Name"
                           required>

                </div>

                <div class="col-md-4">

                    <input type="text"
                           name="doctorName"
                           class="form-control"
                           placeholder="Doctor Name"
                           required>

                </div>

                <div class="col-md-4">

                    <select name="serviceName"
                            class="form-select">

                        <option>General Checkup</option>
                        <option>Dental Package</option>
                        <option>Heart Screening</option>
                        <option>Retina Scan</option>

                    </select>

                </div>

                <div class="col-md-4">

                    <input type="date"
                           name="appointmentDate"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4">

                    <input type="time"
                           name="appointmentTime"
                           class="form-control"
                           required>

                </div>

                <div class="col-md-4">

                    <button class="btn btn-primary w-100">
                        Book Appointment
                    </button>

                </div>

            </form>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                    <tr>

                        <th>ID</th>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Service</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>

                    </tr>

                    </thead>

                    <tbody>

                    <tr th:if="${#lists.isEmpty(appointments)}">

                        <td colspan="8"
                            class="text-center text-muted">

                            No appointments found

                        </td>

                    </tr>

                    <tr th:each="a : ${appointments}">

                        <td th:text="${a.id}"></td>

                        <td th:text="${a.patientName}"></td>

                        <td th:text="${a.doctorName}"></td>

                        <td th:text="${a.serviceName}"></td>

                        <td th:text="${a.appointmentDate}"></td>

                        <td th:text="${a.appointmentTime}"></td>

                        <td>

                            <span th:if="${a.status == 'Pending'}"
                                  class="badge bg-warning text-dark">
                                Pending
                            </span>

                            <span th:if="${a.status == 'Approved'}"
                                  class="badge bg-success">
                                Approved
                            </span>

                            <span th:if="${a.status == 'Cancelled'}"
                                  class="badge bg-danger">
                                Cancelled
                            </span>

                        </td>

                        <td>

                            <a th:href="@{/appointments/approve/{id}(id=${a.id})}"
                               class="btn btn-success btn-sm">
                                Approve
                            </a>

                            <a th:href="@{/appointments/cancel/{id}(id=${a.id})}"
                               class="btn btn-warning btn-sm">
                                Cancel
                            </a>

                            <a th:href="@{/appointments/delete/{id}(id=${a.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this appointment?')">
                                Delete
                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
