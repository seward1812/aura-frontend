<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Package Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo-title">
            RETINA AI<br>ADMIN
        </div>

        <!-- chỉ quay về dashboard -->
        <a href="/"
           class="nav-link">
            Dashboard
        </a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- NAVBAR -->
        <nav class="navbar bg-white shadow-sm rounded-3 px-4 py-3 mb-4">

            <div class="container-fluid">

                <h4 class="mb-0 fw-bold">
                    Package Management
                </h4>

                <span class="text-muted">

                    Welcome,

                    <b th:text="${session.admin}">
                        Admin
                    </b>

                </span>

            </div>

        </nav>

        <!-- DASHBOARD CARD -->
        <div class="row mb-4">

            <div class="col-md-4">

                <div class="card-box text-center">

                    <h6 class="text-muted">
                        Total Packages
                    </h6>

                    <h2 class="fw-bold text-primary"
                        th:text="${#lists.size(packages)}">
                        0
                    </h2>

                </div>

            </div>

        </div>

        <!-- PACKAGE FORM -->
        <div class="card-box mb-4">

            <h5 class="fw-bold mb-4">
                Add New Package
            </h5>

            <form action="/packages/save"
                  method="post"
                  class="row g-3">

                <!-- NAME -->
                <div class="col-md-3">

                    <label class="form-label">
                        Package Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           placeholder="Premium Package"
                           required>

                </div>

                <!-- PRICE -->
                <div class="col-md-2">

                    <label class="form-label">
                        Price
                    </label>

                    <input type="number"
                           step="0.01"
                           name="price"
                           class="form-control"
                           placeholder="99.99"
                           required>

                </div>

                <!-- CREDITS -->
                <div class="col-md-2">

                    <label class="form-label">
                        Credits
                    </label>

                    <input type="number"
                           name="credits"
                           class="form-control"
                           placeholder="100"
                           required>

                </div>

                <!-- DAYS -->
                <div class="col-md-2">

                    <label class="form-label">
                        Duration
                    </label>

                    <input type="number"
                           name="durationDays"
                           class="form-control"
                           placeholder="30"
                           required>

                </div>

                <!-- BUTTON -->
                <div class="col-md-3 d-flex align-items-end">

                    <button class="btn btn-primary w-100">

                        Add Package

                    </button>

                </div>

            </form>

        </div>

        <!-- PACKAGE TABLE -->
        <div class="card-box">

            <div class="d-flex justify-content-between align-items-center mb-3">

                <div>

                    <h5 class="fw-bold mb-1">
                        Package List
                    </h5>

                    <small class="text-muted">

                        Total Packages:

                        <span class="badge bg-primary"
                              th:text="${#lists.size(packages)}">
                            0
                        </span>

                    </small>

                </div>

            </div>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                    <tr>

                        <th>ID</th>
                        <th>Package Name</th>
                        <th>Price</th>
                        <th>Credits</th>
                        <th>Duration</th>
                        <th width="120">Action</th>

                    </tr>

                    </thead>

                    <tbody>

                    <!-- EMPTY -->
                    <tr th:if="${#lists.isEmpty(packages)}">

                        <td colspan="6"
                            class="text-center text-muted">

                            No packages found

                        </td>

                    </tr>

                    <!-- PACKAGE -->
                    <tr th:each="p : ${packages}">

                        <td th:text="${p.id}">
                            1
                        </td>

                        <td th:text="${p.name}">
                            Premium
                        </td>

                        <td>

                            $
                            <span th:text="${p.price}">
                                99
                            </span>

                        </td>

                        <td th:text="${p.credits}">
                            100
                        </td>

                        <td>

                            <span th:text="${p.durationDays}">
                                30
                            </span>

                            days

                        </td>

                        <td>

                            <a th:href="@{/packages/delete/{id}(id=${p.id})}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('Delete this package?')">

                                Delete

                            </a>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
