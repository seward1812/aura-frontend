<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Patients Management</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="/css/style.css">

</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="logo-title">
            RETINA AI<br>ADMIN
        </div>

        <a href="/"
           class="nav-link">
            Dashboard
        </a>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">

        <!-- TOPBAR -->
        <nav class="navbar bg-white shadow-sm rounded-3 px-4 py-3 mb-4">

            <div class="container-fluid">

                <h4 class="mb-0 fw-bold">
                    Account Management
                </h4>

                <span class="text-muted">

                    Welcome,

                    <b th:text="${session.admin}">
                        Admin
                    </b>

                </span>

            </div>

        </nav>

        <!-- SUMMARY CARD -->
        <div class="row mb-4">

            <div class="col-md-4">

                <div class="card-box text-center">

                    <h6 class="text-muted">
                        Total Accounts
                    </h6>

                    <h2 class="fw-bold text-primary"
                        th:text="${#lists.size(users)}">
                        0
                    </h2>

                </div>

            </div>

        </div>

        <!-- USER TABLE -->
        <div class="card-box">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-3">

                <div>

                    <h5 class="fw-bold mb-1">
                        accounts List
                    </h5>

                    <small class="text-muted">

                        Total accounts:

                        <span class="badge bg-primary"
                              th:text="${#lists.size(users)}">
                            0
                        </span>

                    </small>

                </div>

                <!-- ADD BUTTON -->
                <button class="btn btn-primary"
                        data-bs-toggle="modal"
                        data-bs-target="#addUserModal">

                    + Add Patient

                </button>

            </div>

            <!-- SEARCH -->
            <div class="mb-3">

                <input type="text"
                       id="searchInput"
                       class="form-control"
                       placeholder="Search patient...">

            </div>

            <!-- TABLE -->
            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead class="table-primary">

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th width="250">
                            Actions
                        </th>

                    </tr>

                    </thead>

                    <tbody id="userTableBody">

                    <!-- EMPTY -->
                    <tr th:if="${#lists.isEmpty(users)}">

                        <td colspan="5"
                            class="text-center text-muted">

                            No account found

                        </td>

                    </tr>

                    <!-- LOOP -->
                    <tr th:each="user : ${users}">

                        <td th:text="${user.id}">
                            1
                        </td>

                        <td th:text="${user.name}">
                            John
                        </td>

                        <td th:text="${user.email}">
                            john@gmail.com
                        </td>

                        <!-- ROLE -->
                        <td>

                            <span class="badge bg-primary"
                                  th:text="${user.role}">
                                PATIENT
                            </span>

                        </td>

                        <!-- ACTION -->
                        <td>

                            <div class="d-flex gap-2">

                                <!-- EDIT -->
                                <button class="btn btn-warning btn-sm editBtn"

                                        th:attr="
                                        data-id=${user.id},
                                        data-name=${user.name},
                                        data-email=${user.email},
                                        data-role=${user.role}"

                                        data-bs-toggle="modal"
                                        data-bs-target="#editUserModal">

                                    Edit

                                </button>

                                <!-- DELETE -->
                                <a th:href="@{/users/delete/{id}(id=${user.id})}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete this patient?')">

                                    Delete

                                </a>

                            </div>

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- ================= ADD USER MODAL ================= -->
<div class="modal fade"
     id="addUserModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Add account
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form action="/users/save"
                  method="post">

                <div class="modal-body">

                    <!-- NAME -->
                    <div class="mb-3">

                        <label class="form-label">
                            Name
                        </label>

                        <input type="text"
                               name="name"
                               class="form-control"
                               required>

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <!-- ROLE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Role
                        </label>

                        <select name="role"
                                class="form-select">

                            <option>PATIENT</option>
                            <option>DOCTOR</option>
                            <option>CLINIC</option>
                            <option>ADMIN</option>

                        </select>

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Close

                    </button>

                    <button type="submit"
                            class="btn btn-primary">

                        Save Account

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- ================= EDIT USER MODAL ================= -->
<div class="modal fade"
     id="editUserModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Edit Account
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <form action="/users/update"
                  method="post">

                <div class="modal-body">

                    <!-- ID -->
                    <input type="hidden"
                           name="id"
                           id="editId">

                    <!-- NAME -->
                    <div class="mb-3">

                        <label class="form-label">
                            Name
                        </label>

                        <input type="text"
                               name="name"
                               id="editName"
                               class="form-control"
                               required>

                    </div>

                    <!-- EMAIL -->
                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               id="editEmail"
                               class="form-control"
                               required>

                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">

                        <label class="form-label">
                            New Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="Enter new password">

                    </div>

                    <!-- ROLE -->
                    <div class="mb-3">

                        <label class="form-label">
                            Role
                        </label>

                        <select name="role"
                                id="editRole"
                                class="form-select">

                            <option>PATIENT</option>
                            <option>DOCTOR</option>
                            <option>CLINIC</option>
                            <option>ADMIN</option>

                        </select>

                    </div>

                </div>

                <div class="modal-footer">

                    <button type="button"
                            class="btn btn-secondary"
                            data-bs-dismiss="modal">

                        Close

                    </button>

                    <button type="submit"
                            class="btn btn-warning">

                        Update account

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- SEARCH -->
<script>

    const searchInput =
        document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {

        const value =
            this.value.toLowerCase();

        const rows =
            document.querySelectorAll("#userTableBody tr");

        rows.forEach(row => {

            row.style.display =

                row.innerText
                    .toLowerCase()
                    .includes(value)

                    ? ""

                    : "none";

        });

    });

</script>

<!-- EDIT MODAL -->
<script>

    const editButtons =
        document.querySelectorAll(".editBtn");

    editButtons.forEach(button => {

        button.addEventListener("click", function () {

            document.getElementById("editId").value =
                this.dataset.id;

            document.getElementById("editName").value =
                this.dataset.name;

            document.getElementById("editEmail").value =
                this.dataset.email;

            document.getElementById("editRole").value =
                this.dataset.role;

        });

    });

</script>

</body>
</html>
