spring.application.name=demo

spring.cloud.gcp.storage.enabled=false
spring.cloud.gcp.core.enabled=false

gcp.bucket.name=aura_java
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# URL kết nối: Chú ý trustServerCertificate=true để tránh lỗi bảo mật SSL khi chạy local
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=aura_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Cấu hình Hibernate để tự động tạo/cập nhật bảng
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect